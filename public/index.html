<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyroxMC Chat, Map & AI Hub</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Custom Login Modal Box */
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.95); display: flex; align-items: center;
            justify-content: center; z-index: 9999;
        }
        .login-box {
            background: #1e1e1e; padding: 30px; border-radius: 16px; width: 90%;
            max-width: 380px; box-shadow: 0 4px 20px rgba(0, 173, 181, 0.4);
            text-align: center; border: 1px solid #2d2d2d;
        }
        .login-box h2 { color: #00adb5; margin-bottom: 15px; font-size: 1.6rem; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #2a2a2a;
            border: 1px solid #3d3d3d; color: #fff; border-radius: 8px; font-size: 1rem;
            outline: none; box-sizing: border-box;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #00adb5; border: none;
            color: #fff; font-weight: bold; font-size: 1.1rem; border-radius: 8px; cursor: pointer;
        }
        .error-message { color: #ff4a4a; font-size: 0.9rem; margin-bottom: 15px; display: none; }

        /* হেডার ও লোগো বাটন স্টাইল */
        .chat-header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; background: #1f4068; }
        
        .ai-hub-logo-btn {
            background: none; border: none; padding: 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        .ai-hub-logo-btn:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 8px rgba(0, 173, 181, 0.6));
        }
        .ai-hub-logo-btn img {
            width: 42px; height: 42px; object-fit: contain; border-radius: 4px;
        }

        /* 🗺️ Live Map Container */
        #map { width: 100%; height: 200px; background: #222; border-bottom: 2px solid #00adb5; }

        .message-username { font-size: 0.75rem; color: #00adb5; margin-bottom: 2px; font-weight: bold; display: block; }
        .message.sent .message-username { color: #ffde59; text-align: right; }

        /* 🤖 ─── AI SUPER HUB INTERFACE ─── */
        .ai-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; display: none; flex-direction: column; z-index: 10000;
            color: #fff; font-family: sans-serif;
        }
        .ai-header {
            background: #1a1a1a; padding: 15px 20px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid #333;
        }
        .ai-header h2 { color: #00adb5; margin: 0; font-size: 1.4rem; }
        .close-ai-btn { background: #333; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        
        .ai-tabs { display: flex; background: #222; border-bottom: 1px solid #333; }
        .tab-btn {
            flex: 1; padding: 15px; text-align: center; background: none; border: none;
            color: #aaa; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent;
        }
        .tab-btn.active { color: #00adb5; border-bottom-color: #00adb5; background: #1a1a1a; }
        
        .ai-content { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .ai-content.active { display: block; }

        .ai-form { display: flex; flex-direction: column; gap: 15px; max-width: 600px; margin: 0 auto; }
        .ai-form label { font-weight: bold; color: #00adb5; }
        .ai-form textarea {
            background: #222; border: 1px solid #444; color: #fff; padding: 12px;
            border-radius: 8px; resize: none; height: 80px; outline: none; font-size: 1rem;
        }
        .ai-form input[type="file"] { background: #222; padding: 10px; border-radius: 8px; border: 1px dashed #555; }
        .gen-btn {
            background: #00adb5; color: #fff; border: none; padding: 14px;
            border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .gen-btn:hover { background: #00f5ff; }
        
        .output-box {
            margin-top: 25px; border: 1px dashed #444; padding: 20px;
            border-radius: 8px; text-align: center; background: #1a1a1a; min-height: 150px;
        }
        .output-box img, .output-box video { max-width: 100%; border-radius: 8px; margin-top: 10px; }

        .ai-chat-view { display: flex; flex-direction: column; height: 85vh; }
        .ai-chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #1a1a1a; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .ai-chat-input-area { display: flex; gap: 10px; }
        .ai-chat-input-area input { flex: 1; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; outline: none; }
        .ai-chat-input-area button { background: #00adb5; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>CyroxMC Chat & Map</h2>
            <div class="error-message" id="errorMessage">This ID is not recognised</div>
            <form id="loginForm">
                <input type="text" id="loginName" placeholder="Enter Your Name" required>
                <input type="text" id="loginID" placeholder="Enter Your ID" required>
                <button type="submit">Join Room</button>
            </form>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <span id="chatHeaderTitle">CyroxMC Chat Room</span>
            <button class="ai-hub-logo-btn" id="openAiHubBtn" title="Open AI Hub">
                <img src="logo.png" alt="AI Hub">
            </button>
        </div>

        <div id="map"></div>

        <div class="message-area" id="messageArea"></div>

        <form class="input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>


    <div class="ai-overlay" id="aiOverlay">
        <div class="ai-header">
            <h2>CyroxMC AI Creation Suite</h2>
            <button class="close-ai-btn" id="closeAiHubBtn">❌ Back to Chat</button>
        </div>

        <div class="ai-tabs">
            <button class="tab-btn active" onclick="switchAiTab(event, 'aiChatbot')">🤖 AI Chatbot</button>
            <button class="tab-btn" onclick="switchAiTab(event, 'aiImageGen')">🖼️ Image Generator</button>
            <button class="tab-btn" onclick="switchAiTab(event, 'aiVideoGen')">🎬 Video Generator</button>
        </div>

        <div id="aiChatbot" class="ai-content active">
            <div class="ai-chat-view">
                <div class="ai-chat-messages" id="aiChatMessages">
                    <div style="color: #00adb5; margin-bottom: 10px;"><b>AI:</b> Hello! How can I assist you today? Ask me anything!</div>
                </div>
                <div class="ai-chat-input-area">
                    <input type="text" id="aiChatInput" placeholder="Ask AI anything...">
                    <button onclick="sendPromptToAi()">Ask</button>
                </div>
            </div>
        </div>

        <div id="aiImageGen" class="ai-content">
            <div class="ai-form">
                <label>Enter Image Prompt (Text):</label>
                <textarea id="imgPrompt" placeholder="Describe the image you want to generate..."></textarea>
                
                <label>Or Upload Reference Photo (Optional):</label>
                <input type="file" id="imgFile" accept="image/*">
                
                <button class="gen-btn" onclick="generateAiImage()">🎨 Generate Image</button>
                
                <div class="output-box" id="imgOutputBox">
                    <p style="color: #666;">Generated Image will appear here...</p>
                </div>
            </div>
        </div>

        <div id="aiVideoGen" class="ai-content">
            <div class="ai-form">
                <label>Enter Video Prompt (Text):</label>
                <textarea id="videoPrompt" placeholder="Describe the motion or video clip you want to create..."></textarea>
                
                <label>Or Upload Init Image to Animate:</label>
                <input type="file" id="videoFile" accept="image/*">
                
                <button class="gen-btn" onclick="generateAiVideo()">🎬 Generate Video Clip</button>
                
                <div class="output-box" id="videoOutputBox">
                    <p style="color: #666;">Generated Video preview will appear here...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const socket = io("https://cyroxmc-hpsr.onrender.com", { transports: ['websocket', 'polling'] });

        const form = document.getElementById('chatForm');
        const input = document.getElementById('messageInput');
        const messageArea = document.getElementById('messageArea');
        const chatHeaderTitle = document.getElementById('chatHeaderTitle');

        const allowedIDs = ["202504103", "202403011", "20051200"];
        let username = localStorage.getItem('chat_username');
        let userId = localStorage.getItem('chat_userid');

        const map = L.map('map').setView([23.6850, 90.3563], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

        let markers = {}; 
        let firstLoad = true; 

        if (username && userId && allowedIDs.includes(userId)) {
            document.getElementById('loginOverlay').style.display = 'none';
            chatHeaderTitle.innerText = `CyroxMC Room (${username})`;
            startLocationTracking();
            requestNotificationPermission();
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nameVal = document.getElementById('loginName').value.trim();
            const idVal = document.getElementById('loginID').value.trim();

            if (allowedIDs.includes(idVal)) {
                username = nameVal; userId = idVal;
                localStorage.setItem('chat_username', username);
                localStorage.setItem('chat_userid', userId);
                document.getElementById('loginOverlay').style.display = 'none';
                chatHeaderTitle.innerText = `CyroxMC Room (${username})`;
                startLocationTracking();
                requestNotificationPermission();
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('loginID').value = '';
            }
        });

        document.getElementById('openAiHubBtn').addEventListener('click', () => {
            document.getElementById('aiOverlay').style.display = 'flex';
        });
        document.getElementById('closeAiHubBtn').addEventListener('click', () => {
            document.getElementById('aiOverlay').style.display = 'none';
        });

        function switchAiTab(evt, tabId) {
            const contents = document.getElementsByClassName("ai-content");
            for (let i = 0; i < contents.length; i++) { contents[i].classList.remove("active"); }
            const buttons = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < buttons.length; i++) { buttons[i].classList.remove("active"); }
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // 🤖 ─── REAL AI HUB SEND PROMPT ───
        function sendPromptToAi() {
            const inputField = document.getElementById('aiChatInput');
            const txt = inputField.value.trim();
            if(!txt) return;
            
            const chatBox = document.getElementById('aiChatMessages');
            chatBox.innerHTML += `<div style="margin-bottom:10px; text-align:right;"><b>You:</b> ${txt}</div>`;
            inputField.value = '';
            
            // সকেটের মাধ্যমে আসল রিকোয়েস্ট ব্যাকএন্ডে পাঠানো হলো
            socket.emit('ai prompt', { type: 'chat', prompt: txt });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function generateAiImage() {
            const prompt = document.getElementById('imgPrompt').value;
            const output = document.getElementById('imgOutputBox');
            output.innerHTML = `<p style="color:#00adb5;">🎨 Generating image matching: "${prompt || 'Default Prompt'}"... Please wait.</p>`;
            socket.emit('ai prompt', { type: 'image', prompt: prompt });
        }

        function generateAiVideo() {
            const prompt = document.getElementById('videoPrompt').value;
            const output = document.getElementById('videoOutputBox');
            output.innerHTML = `<p style="color:#00adb5;">🎬 Rendering video clip based on instructions... Please wait.</p>`;
            socket.emit('ai prompt', { type: 'video', prompt: prompt });
        }

        // 🤖 ব্যাকএন্ড থেকে জেমিনির আসল রেসপন্স হ্যান্ডেল করার লিসেনার
        socket.on('ai response', (data) => {
            if (data.type === 'chat') {
                const chatBox = document.getElementById('aiChatMessages');
                chatBox.innerHTML += `<div style="color: #00adb5; margin-bottom: 10px;"><b>AI:</b> ${data.text}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });

        function requestNotificationPermission() {
            if ("Notification" in window) {
                if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                    Notification.requestPermission();
                }
            }
        }

        function startLocationTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    if (firstLoad) { map.setView([lat, lng], 13); firstLoad = false; }
                    socket.emit('update location', { id: userId, user: username, lat: lat, lng: lng });
                }, (err) => console.error(err), { enableHighAccuracy: true, maximumAge: 0 });
            }
        }

        socket.on('chat history', (history) => {
            messageArea.innerHTML = ''; 
            history.forEach((data) => {
                const type = (data.id === userId) ? 'sent' : 'received';
                appendMessage(data.user, data.text, type);
            });
        });

        socket.on('initial locations', (allLocations) => {
            Object.keys(allLocations).forEach((id) => {
                const data = allLocations[id];
                if (markers[data.id]) { map.removeLayer(markers[data.id]); }
                markers[data.id] = L.marker([data.lat, data.lng]).addTo(map).bindPopup(`<b>${data.user}</b> HERE`);
                if (data.id !== userId) { markers[data.id].openPopup(); }
            });
        });

        socket.on('user location', (data) => {
            if (markers[data.id]) { map.removeLayer(markers[data.id]); }
            markers[data.id] = L.marker([data.lat, data.lng]).addTo(map).bindPopup(`<b>${data.user}</b> HERE`);
            if (data.id !== userId) { markers[data.id].openPopup(); }
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim() && username && userId) {
                const messageData = { user: username, id: userId, text: input.value };
                socket.emit('chat message', messageData);
                appendMessage(username, input.value, 'sent');
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            if (data.id !== userId) {
                appendMessage(data.user, data.text, 'received');
                if (document.hidden && Notification.permission === "granted") {
                    const notif = new Notification(`New message from ${data.user}`, { body: data.text });
                    notif.onclick = function() { window.focus(); this.close(); };
                }
            }
        });

        function appendMessage(user, text, type) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', type);
            messageElement.innerHTML = `<span class="message-username">${user}</span> ${text}`;
            messageArea.appendChild(messageElement);
            messageArea.scrollTop = messageArea.scrollHeight;
        }
    </script>
</body>
</html>
