<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App for Samin & Cynix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom Login/Call Modal Box */
        .login-overlay, .call-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.95); display: flex; align-items: center;
            justify-content: center; z-index: 9999;
        }
        .login-box, .call-box {
            background: #1e1e1e; padding: 30px; border-radius: 16px; width: 90%;
            max-width: 380px; box-shadow: 0 4px 20px rgba(0, 173, 181, 0.4);
            text-align: center; border: 1px solid #2d2d2d;
        }
        .login-box h2, .call-box h2 { color: #00adb5; margin-bottom: 15px; font-size: 1.6rem; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 15px; background: #2a2a2a;
            border: 1px solid #3d3d3d; color: #fff; border-radius: 8px; font-size: 1rem;
            outline: none; box-sizing: border-box;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #00adb5; border: none;
            color: #fff; font-weight: bold; font-size: 1.1rem; border-radius: 8px; cursor: pointer;
        }
        .error-message { color: #ff4a4a; font-size: 0.9rem; margin-bottom: 15px; display: none; }

        /* হেডার এবং কল বাটন */
        .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .call-btn { background: #0084ff; color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        /* Actions বাটন */
        .call-caller-info { font-size: 1.1rem; color: #eee; margin-bottom: 25px; }
        .call-actions { display: flex; justify-content: space-around; gap: 15px; }
        .btn-action { flex: 1; padding: 14px; border: none; border-radius: 30px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: transform 0.1s; }
        .btn-accept { background: #28a745; color: white; }
        .btn-decline { background: #dc3545; color: white; }

        .message-username { font-size: 0.75rem; color: #00adb5; margin-bottom: 2px; font-weight: bold; display: block; }
        .message.sent .message-username { color: #ffde59; text-align: right; }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>CyroxMC Chat Login</h2>
            <div class="error-message" id="errorMessage">ভুল আইডি! এই আইডিটি অনুমোদিত নয়।</div>
            <form id="loginForm">
                <input type="text" id="loginName" placeholder="Enter Your Name" required>
                <input type="text" id="loginID" placeholder="Enter Your ID" required>
                <button type="submit">Join Chat Room</button>
            </form>
        </div>
    </div>

    <div class="call-overlay" id="callOverlay" style="display: none;">
        <div class="call-box">
            <h2>Incoming Group Call...</h2>
            <div class="call-caller-info" id="callerInfo">Someone is calling</div>
            <div class="call-actions">
                <button class="btn-action btn-accept" id="acceptBtn">📞 Answer</button>
                <button class="btn-action btn-decline" id="declineBtn">❌ Decline</button>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <span id="chatHeaderTitle">CyroxMC Chat Room</span>
            <button class="call-btn" id="callBtn">📞 Group Call</button>
        </div>
        <div class="message-area" id="messageArea"></div>
        <form class="input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io("https://cyroxmc-hpsr.onrender.com", { transports: ['websocket', 'polling'] });

        const form = document.getElementById('chatForm');
        const input = document.getElementById('messageInput');
        const messageArea = document.getElementById('messageArea');
        const chatHeaderTitle = document.getElementById('chatHeaderTitle');
        const callBtn = document.getElementById('callBtn');
        
        const callOverlay = document.getElementById('callOverlay');
        const callerInfo = document.getElementById('callerInfo');
        const acceptBtn = document.getElementById('acceptBtn');
        const declineBtn = document.getElementById('declineBtn');

        const allowedIDs = ["202504103", "202403011"];
        let username = localStorage.getItem('chat_username');
        let userId = localStorage.getItem('chat_userid');

        // রিংটোন লোড (World's Smallest Violin)
        const ringtone = new Audio("https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptrackid=1384022"); 
        ringtone.loop = true;

        // ইউজার স্ক্রিনে টাচ করলেই অডিও আনলক হবে (ব্রাউজার সিকিউরিটি বাইপাস)
        function initAudioUnlock() {
            ringtone.play().then(() => { ringtone.pause(); ringtone.currentTime = 0; }).catch(e => {});
            document.removeEventListener('click', initAudioUnlock);
        }
        document.addEventListener('click', initAudioUnlock);

        if (username && userId && allowedIDs.includes(userId)) {
            document.getElementById('loginOverlay').style.display = 'none';
            chatHeaderTitle.innerText = `CyroxMC Chat (${username})`;
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nameVal = document.getElementById('loginName').value.trim();
            const idVal = document.getElementById('loginID').value.trim();

            if (allowedIDs.includes(idVal)) {
                username = nameVal; userId = idVal;
                localStorage.setItem('chat_username', username);
                localStorage.setItem('chat_userid', userId);
                document.getElementById('loginOverlay').style.display = 'none';
                chatHeaderTitle.innerText = `CyroxMC Chat (${username})`;
                ringtone.load();
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('loginID').value = '';
            }
        });

        // --- 📞 সিগন্যাল ভিত্তিক কল সিস্টেম (কোনো মাইক্রোফোন পারমিশন লাগবে না) ---
        callBtn.addEventListener('click', () => {
            if (callBtn.innerText === "📞 Group Call") {
                // মাইক্রোফোনের তোয়াক্কা না করে সরাসরি সার্ভারে কল রিকোয়েস্ট পাঠানো হবে
                socket.emit('start call', { from: username, id: userId });
                
                callBtn.style.background = "#dc3545";
                callBtn.innerText = "❌ End Call";
                chatHeaderTitle.innerText = `Calling group...`;
            } else {
                socket.emit('stop call');
                endCurrentCall();
            }
        });

        // ওপার থেকে কল আসলে সাথে সাথে পপ-আপ ট্রিগার হবে
        socket.on('incoming call', (data) => {
            if (data.id !== userId) {
                callerInfo.innerText = `${data.from} কল দিচ্ছেন...`;
                callOverlay.style.display = 'flex';
                
                // রিংটোন প্লে করার চেষ্টা
                ringtone.play().catch(e => console.log("Audio waiting for user click."));
            }
        });

        // Answer বাটন লজিক
        acceptBtn.addEventListener('click', () => {
            ringtone.pause();
            ringtone.currentTime = 0;
            callOverlay.style.display = 'none';
            chatHeaderTitle.innerText = `Joined Call 🟢`;
        });

        // Decline বাটন লজিক
        declineBtn.addEventListener('click', () => {
            ringtone.pause();
            ringtone.currentTime = 0;
            callOverlay.style.display = 'none';
        });

        socket.on('end call', () => {
            endCurrentCall();
        });

        function endCurrentCall() {
            ringtone.pause();
            ringtone.currentTime = 0;
            callOverlay.style.display = 'none';
            callBtn.style.background = "#0084ff";
            callBtn.innerText = "📞 Group Call";
            chatHeaderTitle.innerText = `CyroxMC Chat (${username})`;
        }

        // মেসেজ কোড
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim() && username && userId) {
                const messageData = { user: username, id: userId, text: input.value };
                socket.emit('chat message', messageData);
                appendMessage(username, input.value, 'sent');
                input.value = '';
            }
        });

        socket.on('chat message', (data) => {
            if (data.id !== userId) appendMessage(data.user, data.text, 'received');
        });

        function appendMessage(user, text, type) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', type);
            messageElement.innerHTML = `<span class="message-username">${user}</span> ${text}`;
            messageArea.appendChild(messageElement);
            messageArea.scrollTop = messageArea.scrollHeight;
        }
    </script>
</body>
</html>
