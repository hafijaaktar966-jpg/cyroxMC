<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App for Samin & Cynix</title>
    <!-- সিএসএস ফাইল লিঙ্ক করার লাইন -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="chat-container">
        <!-- চ্যাট হেডার -->
        <div class="chat-header">
            CyroxMC Chat Room
        </div>

        <!-- মেসেজ দেখার মেইন এরিয়া -->
        <div class="message-area" id="messageArea">
            <!-- মেসেজগুলো এখানে অটোমেটিক জমা হবে -->
        </div>

        <!-- মেসেজ লেখার এবং পাঠানোর এরিয়া -->
        <form class="input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <!-- Socket.io স্ক্রিপ্ট লিঙ্ক (সার্ভার থেকে অটো পাবে) -->
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        // সরাসরি রেন্ডার ইউআরএল ও ট্রান্সপোর্ট ফিক্স করা হলো
        const socket = io("https://cyroxmc-hpsr.onrender.com", {
            transports: ['websocket', 'polling']
        });

        const form = document.getElementById('chatForm');
        const input = document.getElementById('messageInput');
        const messageArea = document.getElementById('messageArea');

        // অ্যাপ চালু হলেই নোটিফিকেশনের পারমিশন চাওয়া
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        // মেসেজ পাঠানোর লজিক
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                // সার্ভারে মেসেজ পাঠানো
                socket.emit('chat message', input.value);
                
                // নিজের স্ক্রিনে মেসেজটি ডানপাশে শো করা
                appendMessage(input.value, 'sent');
                input.value = '';
            }
        });

        // সার্ভার থেকে নতুন কোনো মেসেজ আসলে তা গ্রহণ করা
        socket.on('chat message', (msg) => {
            // অন্যের পাঠানো মেসেজগুলো বামপাশে শো করানোর জন্য
            appendMessage(msg, 'received');

            // যদি ইউজার অ্যাপের বাইরে থাকে বা অন্য ট্যাবে থাকে, তবে নোটিফিকেশন দেখাবে
            if (document.hidden && Notification.permission === "granted") {
                new Notification("CyroxMC Chat", {
                    body: "নতুন মেসেজ: " + msg,
                    icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png" // একটি সাধারণ চ্যাট আইকন
                });
            }
        });

        // স্ক্রিনে মেসেজ বাবল যোগ করার ফাংশন
        function appendMessage(text, type) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', type);
            messageElement.innerText = text;
            messageArea.appendChild(messageElement);
            
            // নতুন মেসেজ আসলে অটোমেটিক নিচে স্ক্রোল হবে
            messageArea.scrollTop = messageArea.scrollHeight;
        }
    </script>
</body>
</html>
