<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Chat Room</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 20px; }
        #chat-box { height: 400px; border: 1px solid #333; background: #1e1e1e; overflow-y: auto; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        #messages { list-style-type: none; padding: 0; margin: 0; }
        #messages li { padding: 8px 12px; margin-bottom: 8px; background: #2d2d2d; border-radius: 5px; width: fit-content; max-width: 80%; }
        #form { display: flex; }
        #input { flex-grow: 1; padding: 12px; border: none; border-radius: 5px 0 0 5px; background: #2d2d2d; color: #fff; }
        button { padding: 12px 20px; border: none; background: #007bff; color: white; border-radius: 0 5px 5px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Minecraft server Abdur Rahman and Samin manhunt</h2>
    <div id="chat-box"><ul id="messages"></ul></div>
    <form id="form">
        <input id="input" autocomplete="off" placeholder="write your massage, SAMIN!..." />
        <button>Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
