<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App for Samin & Cynix</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom Login Modal Box */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 18, 18, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .login-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 173, 181, 0.3);
            text-align: center;
            border: 1px solid #2d2d2d;
        }
        .login-box h2 {
            color: #00adb5;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #2a2a2a;
            border: 1px solid #3d3d3d;
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        .login-box input:focus {
            border-color: #00adb5;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #00adb5;
            border: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #007a80;
        }
        /* এরর মেসেজের স্টাইল */
        .error-message {
            color: #ff4a4a;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }
        /* Message Username and ID */
        .message-username {
            font-size: 0.75rem;
            color: #00adb5;
            margin-bottom: 2px;
            font-weight: bold;
            display: block;
        }
        .message-id {
            font-size: 0.65rem;
            color: #888;
            font-weight: normal;
            margin-left: 3px;
        }
        .message.sent .message-username {
            color: #ffde59;
            text-align: right;
        }
    </style>
</head>
<body>

    <!-- Custom Login Form Box -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>CyroxMC Chat Login</h2>
            <!-- ভুল আইডি দিলে এই মেসেজটি দেখাবে -->
            <div class="error-message" id="errorMessage">error:this id is not recognised/div>
            <form id="loginForm">
                <input type="text" id="loginName" placeholder="Enter Your Name" required>
                <input type="text" id="loginID" placeholder="Enter Your ID" required>
                <button type="submit">Join Chat Room</button>
            </form>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="chat-container">
        <div class="chat-header" id="chatHeader">
            CyroxMC Chat Room
        </div>

        <div class="message-area" id="messageArea"></div>

        <form class="input-area" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        const socket = io("https://cyroxmc-hpsr.onrender.com", {
            transports: ['websocket', 'polling']
        });

        const form = document.getElementById('chatForm');
        const input = document.getElementById('messageInput');
        const messageArea = document.getElementById('messageArea');
        const chatHeader = document.getElementById('chatHeader');
        
        const loginOverlay = document.getElementById('loginOverlay');
        const loginForm = document.getElementById('loginForm');
        const loginName = document.getElementById('loginName');
        const loginID = document.getElementById('loginID');
        const errorMessage = document.getElementById('errorMessage');

        // 🔴 এখানে আপনার অনুমোদিত আইডিগুলোর লিস্ট আছে
        // ভবিষ্যতে নতুন আইডি যোগ করতে চাইলে কমা (,) দিয়ে কোটেশনের ভেতর লিখে দিলেই হবে
        const allowedIDs = ["202504103", "202403011"];

        let username = localStorage.getItem('chat_username');
        let userId = localStorage.getItem('chat_userid');

        // যদি ব্রাউজারে আগে থেকে সেভ থাকা আইডিটি আমাদের লিস্টে থাকে, তবে সরাসরি লগইন হবে
        if (username && userId && allowedIDs.includes(userId)) {
            loginOverlay.style.display = 'none';
            chatHeader.innerText = `CyroxMC Chat Room (${username}#${userId})`;
        } else {
            // যদি আগে ভুল আইডি সেভ হয়ে থাকে বা আইডি লিস্টে না থাকে, তবে লোকাল স্টোরেজ ক্লিয়ার করে লগইন স্ক্রিন দেখাবে
            localStorage.removeItem('chat_username');
            localStorage.removeItem('chat_userid');
            loginOverlay.style.display = 'flex';
        }

        // Login Submit handle
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const nameVal = loginName.value.trim();
            const idVal = loginID.value.trim();

            // আইডিটি লিস্টে আছে কিনা চেক করা হচ্ছে
            if (allowedIDs.includes(idVal)) {
                errorMessage.style.display = 'none'; // এরর মেসেজ লুকানো
                username = nameVal;
                userId = idVal;
                
                localStorage.setItem('chat_username', username);
                localStorage.setItem('chat_userid', userId);
                
                loginOverlay.style.display = 'none';
                chatHeader.innerText = `CyroxMC Chat Room (${username}#${userId})`;
            } else {
                // আইডি লিস্টে না মিললে এরর মেসেজ দেখাবে
                errorMessage.style.display = 'block';
                loginID.value = ''; // আইডি বক্সটি খালি করে দেবে
            }
        });

        // Message pathanor logic
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim() && username && userId) {
                const messageData = {
                    user: username,
                    id: userId,
                    text: input.value
                };

                socket.emit('chat message', messageData);
                appendMessage(username, userId, input.value, 'sent');
                input.value = '';
            }
        });

        // Server theke message ricihve kora
        socket.on('chat message', (data) => {
            if (data.id !== userId) {
                appendMessage(data.user, data.id, data.text, 'received');
            }
        });

        // Screen-e message box dekhano
        function appendMessage(user, id, text, type) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message', type);
            
            messageElement.innerHTML = `
                <span class="message-username">${user}<span class="message-id">#${id}</span></span> 
                ${text}
            `;
            
            messageArea.appendChild(messageElement);
            messageArea.scrollTop = messageArea.scrollHeight;
        }
    </script>
</body>
</html>.scrollHeight;
        }
    </script>
</body>
</html>
